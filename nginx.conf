server {
    listen 80;
    server_name app.padelhub.fr;

    root /usr/share/nginx/html;
    index index.html;

    location ~* \.js$ {
        add_header Content-Type application/javascript;
        try_files $uri =404;
    }

    location ~* \.(css|woff2|woff|svg|ttf|eot|otf|json|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
    }
}
