server {
    listen 80;
    server_name app.padelhub.fr;

    root /usr/share/nginx/html;
    index index.html;

    # 1) Ne JAMAIS mettre en cache l'index (détecte la nouvelle version)
    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # 2) Ne pas mettre en cache les artefacts du SW
    location = /ngsw.json {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /ngsw-worker.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /manifest.webmanifest {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Type "application/manifest+json; charset=utf-8" always;
    }

    # 3) Bundles/Assets AVEC hash dans le nom → cache long + immutable
    #   - Angular produit ...-[a-f0-9]{8,}.js|css (ou .[hash].js)
    location ~* (?:-[0-9a-f]{8,}\.(?:js|css)|\.[0-9a-f]{8,}\.(?:js|css))$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
    location ~* \.[0-9a-f]{8,}\.(?:png|jpg|jpeg|webp|svg|ico|gif|woff2?|ttf|eot|otf)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # 4) Fichiers SANS hash (fallback): cache raisonnable
    location ~* \.(?:js|css|png|jpg|jpeg|webp|svg|ico|gif|woff2?|ttf|eot|otf)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # 5) Routeur Angular (SPA)
    location / {
        try_files $uri $uri/ /index.html =404;
    }
}
