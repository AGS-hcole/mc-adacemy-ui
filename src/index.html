<!doctype html>
<html lang="fr">
    <head>
        <title>
            My Center Academy - Gérez et optimisez vos entraînements de padel :
            planifiez les présences, organisez les groupes et suivez les progrès
            des élèves.
        </title>
        <meta charset="utf-8" />
        <meta
            name="description"
            content="My Center Academy est une application professionnelle dédiée à la gestion des présences lors des entraînements de padel et à l'organisation des tournois. Optimisez la planification, le suivi des joueurs et la coordination des événements au sein de l'académie."
        />
        <meta
            name="keywords"
            content="My Center Academy, padel, académie, entraînement, sport, gestion, présence, statistiques"
        />
        <meta
            name="viewport"
            content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0"
        />

        <base href="/" />

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="favicon-16x16.png" />
        <link rel="icon" type="image/png" href="favicon-32x32.png" />

        <!-- PWA Manifest -->
        <link rel="manifest" href="manifest.webmanifest" />
        <meta name="theme-color" content="#1976d2" />

        <!-- iOS PWA Support -->
        <link rel="apple-touch-icon" href="icons/apple-icon-180.png" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="MyCenter Academy" />

        <!-- Fonts -->
        <link href="https://fonts.gstatic.com" rel="preconnect" />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
            rel="stylesheet"
        />

        <!-- Icon fonts -->
        <link
            href="https://fonts.googleapis.com/icon?family=Material+Icons"
            rel="stylesheet"
        />
    </head>

    <body>
        <!-- Splash screen -->
        <fuse-splash-screen>
            <img src="images/logo/logo-solo.svg" alt="My Center Academy logo" />
            <div class="spinner">
                <div class="bounce1"></div>
                <div class="bounce2"></div>
                <div class="bounce3"></div>
            </div>
        </fuse-splash-screen>

        <!-- App root -->
        <app-root></app-root>
    </body>
</html>
