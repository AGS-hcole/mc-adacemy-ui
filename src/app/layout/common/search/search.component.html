<!-- Bar search -->
@if (!opened) {
    <button mat-icon-button (click)="open()">
        <mat-icon [svgIcon]="'heroicons_outline:magnifying-glass'"></mat-icon>
    </button>
}
@if (opened) {
    <div
        class="bg-card absolute inset-0 z-99 flex shrink-0 items-center"
        @slideInTop
        @slideOutTop
    >
        <mat-icon
            class="absolute ml-6 sm:ml-8"
            [svgIcon]="'heroicons_outline:magnifying-glass'"
        ></mat-icon>
        <input
            class="h-full w-full px-16 sm:px-18"
            [formControl]="searchControl"
            [matAutocomplete]="matAutocomplete"
            [placeholder]="'SHARED.SEARCH.PH_SEARCH' | transloco"
            (keydown)="onKeydown($event)"
            #barSearchInput
        />
        <mat-autocomplete
            class="max-h-128 rounded-b border-t shadow-md sm:px-2"
            [autoSelectActiveOption]="true"
            [disableRipple]="true"
            #matAutocomplete="matAutocomplete"
        >
            @if (groups && groups.length === 0) {
                <mat-option
                    class="text-secondary pointer-events-none bg-transparent px-6 py-0 text-md"
                >
                    {{ 'SHARED.SEARCH.NO_RESULTS' | transloco }}
                </mat-option>
            }
            @if (groups && groups.length > 0) {
                <mat-optgroup class="mt-2 flex items-center px-2">
                    <span
                        class="text-secondary text-sm font-semibold tracking-wider"
                        >{{ 'SHARED.SEARCH.GROUP_RESULTS' | transloco }}</span
                    >
                </mat-optgroup>
                @for (group of groups; track trackByFn($index, group)) {
                    <mat-option
                        class="group relative mb-1 rounded-md px-6 py-0 text-md dark:hover:bg-hover hover:bg-gray-100"
                        [routerLink]="updateRouteGroupId(group.id)"
                        (click)="close()"
                        [value]="group.id"
                    >
                        <!-- Groups -->
                        <ng-container
                            *ngTemplateOutlet="
                                groupResult;
                                context: { $implicit: group }
                            "
                        ></ng-container>
                    </mat-option>
                }
            }
        </mat-autocomplete>
        <button
            class="absolute right-5 top-1/2 -mt-5 h-10 w-10 shrink-0 sm:right-7"
            mat-icon-button
            (click)="close()"
        >
            <mat-icon [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
        </button>
    </div>
}

<!-- Group result template -->
<ng-template #groupResult let-group>
    <div class="flex flex-col">
        <div class="truncate leading-normal" [innerHTML]="group.name"></div>
        <div class="text-secondary truncate text-sm leading-normal">
            {{ buildGroupBreadcrumbs(group) }}
        </div>
    </div>
</ng-template>
