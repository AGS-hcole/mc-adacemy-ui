<h2 mat-dialog-title>
    {{ 'DASHBOARD.RATING_EDIT.TITLE' | transloco: { defaultValue: 'Edit Rating' } }}
</h2>

<mat-dialog-content class="mat-typography">
    <p class="text-secondary mb-4">
        {{ data.participantName }}
    </p>

    <!-- Score slider -->
    <div class="mb-6">
        <label class="mb-2 block text-sm font-medium">
            {{ 'DASHBOARD.RATING_EDIT.SCORE' | transloco: { defaultValue: 'Score' } }}
        </label>
        <div class="flex items-center gap-4">
            <mat-slider min="0" max="10" step="1" discrete [displayWith]="formatLabel" class="flex-auto">
                <input matSliderThumb [(ngModel)]="score" />
            </mat-slider>
            <div class="text-lg font-bold" [class.text-green-600]="score >= 7" [class.text-orange-600]="score >= 4 && score < 7" [class.text-red-600]="score < 4">
                {{ score }}/10
            </div>
        </div>
    </div>

    <!-- Comment textarea -->
    <mat-form-field class="w-full">
        <mat-label>{{
            'DASHBOARD.RATING_EDIT.COMMENT' | transloco: { defaultValue: 'Comment' }
        }}</mat-label>
        <textarea
            matInput
            [(ngModel)]="comment"
            [placeholder]="
                'DASHBOARD.RATING_EDIT.COMMENT_PLACEHOLDER' | transloco: { defaultValue: 'Add a comment...' }
            "
            [maxlength]="maxLength"
            rows="6"
        ></textarea>
        <mat-hint align="end">
            {{ getRemainingChars() }} /
            {{ maxLength }}
        </mat-hint>
    </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">
        {{ 'DASHBOARD.RATING_EDIT.CANCEL' | transloco: { defaultValue: 'Cancel' } }}
    </button>
    <button mat-flat-button color="primary" (click)="save()">
        {{ 'DASHBOARD.RATING_EDIT.SAVE' | transloco: { defaultValue: 'Save' } }}
    </button>
</mat-dialog-actions>
