<div class="absolute inset-0 flex min-w-0 flex-col overflow-y-auto" cdkScrollable>
    <!-- Header -->
    <div class="dark relative flex-0 overflow-hidden bg-primary px-4 py-8 sm:p-12">
        <!-- Background -->
        <!-- Rings -->
        <!-- prettier-ignore -->
        <svg class="absolute inset-0 pointer-events-none"
             viewBox="0 0 960 540" width="100%" height="100%" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
            <g class="text-gray-700 opacity-25" fill="none" stroke="currentColor" stroke-width="100">
                <circle r="234" cx="196" cy="23"></circle>
                <circle r="234" cx="790" cy="491"></circle>
            </g>
        </svg>
        <div class="relative z-10 flex flex-col items-center">
            <h2 class="text-xl font-semibold">
                {{ 'DASHBOARD.TITLE' | transloco: { defaultValue: 'Admin Dashboard' } }}
            </h2>
            <div class="mt-1 text-center text-4xl font-extrabold leading-tight tracking-tight sm:text-7xl">
                {{ 'DASHBOARD.SUBTITLE' | transloco: { defaultValue: 'Day View' } }}
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="-mt-px flex-auto border-t pt-6">
        <div class="mx-auto w-full max-w-screen-xl px-6 sm:px-8">
            <!-- Date toolbar -->
            <div class="mb-6">
                <dashboard-date-toolbar
                    [selectedDate]="selectedDate"
                    (dateChange)="onDateChange($event)"
                ></dashboard-date-toolbar>
            </div>

            <!-- Error state -->
            <div
                *ngIf="error && !loading"
                class="bg-card mb-6 flex flex-col items-center justify-center rounded-lg p-8 shadow"
            >
                <mat-icon
                    [svgIcon]="'heroicons_outline:exclamation-triangle'"
                    class="icon-size-12 text-red-500"
                ></mat-icon>
                <div class="mt-4 text-center">
                    <div class="text-lg font-medium text-red-600">
                        {{ 'DASHBOARD.ERROR_TITLE' | transloco: { defaultValue: 'Error loading data' } }}
                    </div>
                    <div class="text-secondary mt-2">{{ error }}</div>
                    <button
                        mat-flat-button
                        color="primary"
                        class="mt-4"
                        (click)="retry()"
                    >
                        {{ 'DASHBOARD.RETRY' | transloco: { defaultValue: 'Retry' } }}
                    </button>
                </div>
            </div>

            <!-- Content layout: 2 columns on desktop, 1 column on mobile -->
            <div *ngIf="!error" class="grid grid-cols-1 gap-6 lg:grid-cols-12">
                <!-- Left column (sessions) - takes 2/3 width on desktop -->
                <div class="lg:col-span-8">
                    <sessions-day-card
                        [sessions]="dashboardData?.sessions || []"
                        [loading]="loading"
                        (editRating)="onEditRating($event)"
                    ></sessions-day-card>
                </div>

                <!-- Right column (manors + transports) - takes 1/3 width on desktop -->
                <div class="space-y-6 lg:col-span-4">
                    <manors-day-card
                        [manors]="dashboardData?.manors || []"
                        [loading]="loading"
                    ></manors-day-card>

                    <transports-day-card
                        [transports]="dashboardData?.transports || []"
                        [loading]="loading"
                    ></transports-day-card>
                </div>
            </div>
        </div>
    </div>
</div>
