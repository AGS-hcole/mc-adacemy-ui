<div class="absolute inset-0 flex flex-col min-w-0 overflow-hidden">
    <!-- Header -->
    <div class="relative flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between py-8 px-6 md:px-8 border-b bg-card dark:bg-transparent">
        <!-- Loader -->
        <div class="absolute inset-x-0 bottom-0" *ngIf="!session">
            <mat-progress-bar [mode]="'indeterminate'"></mat-progress-bar>
        </div>
        
        <!-- Back button -->
        <div class="flex items-center">
            <button
                mat-icon-button
                [matTooltip]="'Retour'"
                (click)="goBack()">
                <mat-icon [svgIcon]="'heroicons_outline:arrow-left'"></mat-icon>
            </button>
            <div class="ml-4" *ngIf="session">
                <div class="text-2xl font-semibold tracking-tight">
                    {{ session.date | date: 'fullDate' }}
                </div>
                <div class="text-sm text-secondary">
                    {{ session.site?.name || session.siteId }}
                </div>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="flex overflow-x-auto border-b bg-gray-50 dark:bg-transparent">
        <nav class="flex space-x-6 px-6 md:px-8" aria-label="Tabs">
            <a
                class="flex items-center px-1 py-4 text-sm font-medium border-b-2 transition-colors cursor-pointer"
                [routerLink]="['./info']"
                routerLinkActive="border-primary text-primary"
                [routerLinkActiveOptions]="{exact: false}"
                #rlaInfo="routerLinkActive"
                [class.border-transparent]="!rlaInfo.isActive"
                [class.text-secondary]="!rlaInfo.isActive"
                [class.hover:text-primary]="!rlaInfo.isActive">
                <mat-icon
                    class="icon-size-5 mr-2"
                    [svgIcon]="'heroicons_outline:information-circle'">
                </mat-icon>
                {{ 'SESSIONS.ADMIN.VIEW.TABS.INFO' | transloco }}
            </a>
            <a
                class="flex items-center px-1 py-4 text-sm font-medium border-b-2 transition-colors cursor-pointer"
                [routerLink]="['./participants']"
                routerLinkActive="border-primary text-primary"
                [routerLinkActiveOptions]="{exact: false}"
                #rlaParticipants="routerLinkActive"
                [class.border-transparent]="!rlaParticipants.isActive"
                [class.text-secondary]="!rlaParticipants.isActive"
                [class.hover:text-primary]="!rlaParticipants.isActive">
                <mat-icon
                    class="icon-size-5 mr-2"
                    [svgIcon]="'heroicons_outline:user-group'">
                </mat-icon>
                {{ 'SESSIONS.ADMIN.VIEW.TABS.PARTICIPANTS' | transloco }}
                <span class="ml-2 px-2 py-0.5 text-xs rounded-full bg-gray-200 dark:bg-gray-700" *ngIf="session">
                    {{ session.currentAttendees || 0 }}
                </span>
            </a>
        </nav>
    </div>

    <!-- Content -->
    <div class="flex-auto overflow-y-auto">
        <router-outlet></router-outlet>
    </div>
</div>
