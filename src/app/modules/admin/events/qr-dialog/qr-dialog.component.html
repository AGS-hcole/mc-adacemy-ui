<div class="flex flex-col">
    <!-- Header -->
    <div mat-dialog-title class="flex items-center justify-between">
        <h2 class="text-xl font-semibold">
            {{ 'EVENTS.ADMIN.QR_DIALOG.TITLE' | transloco }}
        </h2>
        <button
            mat-icon-button
            (click)="close()"
        >
            <mat-icon>heroicons_outline:x-mark</mat-icon>
        </button>
    </div>

    <!-- Content -->
    <div
        mat-dialog-content
        class="flex min-h-[300px] items-center justify-center"
    >
        @if (loading) {
            <mat-spinner diameter="40"></mat-spinner>
        } @else if (error) {
            <div class="text-center">
                <mat-icon class="icon-size-16 text-red-500"
                    >heroicons_outline:exclamation-triangle</mat-icon
                >
                <p class="mt-2 text-gray-600">Error loading QR code</p>
            </div>
        } @else if (qrImageUrl) {
            <img
                [src]="qrImageUrl"
                alt="QR Code"
                class="max-w-full"
            />
        }
    </div>

    <!-- Actions -->
    <div
        mat-dialog-actions
        class="flex justify-end gap-2"
    >
        <button
            mat-stroked-button
            (click)="close()"
        >
            Close
        </button>
        <button
            mat-flat-button
            color="primary"
            [disabled]="!qrImageUrl"
            (click)="download()"
        >
            <mat-icon>heroicons_outline:arrow-down-tray</mat-icon>
            <span class="ml-2">{{
                'EVENTS.ADMIN.QR_DIALOG.DOWNLOAD' | transloco
            }}</span>
        </button>
    </div>
</div>
