<div class="bg-card mb-8 h-full rounded-lg p-6 shadow">
    <div class="mb-4">
        <h3 class="text-lg font-semibold">
            {{ 'REPORTS.CHART.SESSIONS_OVER_TIME' | transloco }}
        </h3>
    </div>

    <div
        *ngIf="loading"
        class="h-[350px] animate-pulse rounded bg-gray-200"
    ></div>

    <div *ngIf="!loading && timeseries">
        <apx-chart
            #chart
            [series]="chartOptions.series!"
            [chart]="chartOptions.chart!"
            [xaxis]="chartOptions.xaxis!"
            [yaxis]="chartOptions.yaxis!"
            [dataLabels]="chartOptions.dataLabels!"
            [grid]="chartOptions.grid!"
            [stroke]="chartOptions.stroke!"
            [tooltip]="chartOptions.tooltip!"
            [legend]="chartOptions.legend!"
        >
        </apx-chart>
    </div>

    <div
        *ngIf="!loading && !timeseries"
        class="text-secondary flex h-[350px] items-center justify-center"
    >
        <div class="text-center">
            <mat-icon
                class="mb-4 icon-size-12"
                svgIcon="heroicons_outline:chart-bar"
            ></mat-icon>
            <p>{{ 'REPORTS.EMPTY.NO_DATA' | transloco }}</p>
        </div>
    </div>
</div>
