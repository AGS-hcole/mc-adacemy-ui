<div class="absolute inset-0 flex min-w-0 flex-col overflow-y-auto">
    <!-- Header -->
    <div class="bg-card shadow-sm">
        <div class="px-6 py-8">
            <h1 class="text-3xl font-bold">
                {{ 'REPORTS.TITLE' | transloco }}
            </h1>
            <p class="text-secondary mt-2">
                {{ 'REPORTS.DESCRIPTION' | transloco }}
            </p>
        </div>
    </div>

    <!-- Filters -->
    <reports-filters
        [filters]="filters"
        (filtersChange)="onFiltersChange($event)"
        (apply)="onApplyFilters()"
        (reset)="onResetFilters()"
    >
    </reports-filters>

    <!-- Main Content -->
    <div class="flex-auto space-y-8 p-6">
        <!-- Error Banner -->
        <div
            *ngIf="error"
            class="mb-8 rounded-lg border border-red-200 bg-red-50 p-4"
        >
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <mat-icon
                        class="mr-3 text-red-600 icon-size-6"
                        svgIcon="heroicons_solid:exclamation-circle"
                    ></mat-icon>
                    <div>
                        <h4 class="font-semibold text-red-800">
                            {{ 'REPORTS.ERROR.TITLE' | transloco }}
                        </h4>
                        <p class="mt-1 text-sm text-red-700">{{ error }}</p>
                    </div>
                </div>
                <button mat-stroked-button color="warn" (click)="retry()">
                    {{ 'REPORTS.ACTIONS.RETRY' | transloco }}
                </button>
            </div>
        </div>

        <!-- KPI Cards -->
        <reports-kpi-cards [summary]="summary" [loading]="loading">
        </reports-kpi-cards>

        <!-- Charts -->
        <div class="grid grid-cols-1 gap-8 lg:grid-cols-2">
            <!-- Timeseries Chart -->
            <div class="lg:col-span-2">
                <reports-timeseries-chart
                    [timeseries]="timeseries"
                    [loading]="loading"
                >
                </reports-timeseries-chart>
            </div>

            <!-- Contract Share Chart -->
            <div class="lg:col-span-2">
                <reports-contract-share-chart
                    [summary]="summary"
                    [loading]="loading"
                >
                </reports-contract-share-chart>
            </div>
        </div>

        <!-- Ratings Section -->
        <reports-ratings-section
            [ratingsSummary]="ratingsSummary"
            [loading]="loading"
            [filteredUserId]="filters?.userId"
        >
        </reports-ratings-section>

        <!-- Export Actions -->
        <div class="-mt-6 flex items-center justify-end gap-2 pb-8">
            <button
                mat-stroked-button
                (click)="exportCsv()"
                [disabled]="!sessionsList || sessionsList.items.length === 0"
            >
                <mat-icon
                    class="icon-size-5"
                    svgIcon="heroicons_solid:document-arrow-down"
                ></mat-icon>
                <span class="ml-2">{{
                    'REPORTS.ACTIONS.EXPORT_CSV' | transloco
                }}</span>
            </button>
            <button
                mat-stroked-button
                (click)="exportJson()"
                [disabled]="!sessionsList || sessionsList.items.length === 0"
            >
                <mat-icon
                    class="icon-size-5"
                    svgIcon="heroicons_solid:code-bracket"
                ></mat-icon>
                <span class="ml-2">{{
                    'REPORTS.ACTIONS.EXPORT_JSON' | transloco
                }}</span>
            </button>
        </div>

        <!-- Table -->
        <reports-table
            [sessionsList]="sessionsList"
            [loading]="loading"
            (pageChange)="onPageChange($event)"
            (viewSession)="onViewSession($event)"
        >
        </reports-table>
    </div>
</div>
