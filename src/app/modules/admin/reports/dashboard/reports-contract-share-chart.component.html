<div class="bg-card rounded-lg shadow p-6 mb-8">
    <div class="mb-4">
        <h3 class="text-lg font-semibold">{{ 'REPORTS.CHART.CONTRACT_SHARE' | transloco }}</h3>
    </div>
    
    <div *ngIf="loading" class="h-[350px] bg-gray-200 rounded animate-pulse"></div>
    
    <div *ngIf="!loading && summary && (summary.totals.underContract > 0 || summary.totals.offContract > 0)">
        <apx-chart
            #chart
            [series]="chartOptions.series!"
            [chart]="chartOptions.chart!"
            [labels]="chartOptions.labels!"
            [legend]="chartOptions.legend!"
            [responsive]="chartOptions.responsive!"
            [colors]="chartOptions.colors!">
        </apx-chart>
    </div>
    
    <div *ngIf="!loading && (!summary || (summary.totals.underContract === 0 && summary.totals.offContract === 0))" 
         class="flex items-center justify-center h-[350px] text-secondary">
        <div class="text-center">
            <mat-icon class="icon-size-12 mb-4" svgIcon="heroicons_outline:chart-pie"></mat-icon>
            <p>{{ 'REPORTS.EMPTY.NO_DATA' | transloco }}</p>
        </div>
    </div>
</div>
