<div
    class="flex min-w-0 flex-auto flex-col items-center sm:flex-row sm:justify-center md:items-start md:justify-start"
>
    <div
        class="relative hidden h-full flex-auto items-center justify-center overflow-hidden bg-gray-800 p-16 md:flex lg:px-28 dark:border-r"
    >
        <!-- Background -->
        <!-- Rings -->
        <!-- prettier-ignore -->
        <img class="absolute inset-0 pointer-events-none w-full h-full object-cover" src="background.png" alt="Background" />
        <!-- Content -->
        <div class="relative z-10 w-full max-w-2xl">
            <div class="w-full max-w-xs">
                <img
                    src="images/logo/logo-text-on-dark.svg"
                    alt="MyCenter Academy Logo"
                />
            </div>
            <div class="mt-6 text-lg leading-6 tracking-tight text-gray-400">
                {{ 'AUTH.SUBTITLE' | transloco }}
            </div>
            <div class="mt-8 flex items-center">
                <div class="flex flex-0 items-center -space-x-1.5">
                    <img
                        class="h-10 w-10 flex-0 rounded-full object-cover ring-4 ring-gray-800 ring-offset-1 ring-offset-gray-800"
                        src="images/avatars/female-18.jpg"
                    />
                    <img
                        class="h-10 w-10 flex-0 rounded-full object-cover ring-4 ring-gray-800 ring-offset-1 ring-offset-gray-800"
                        src="images/avatars/female-11.jpg"
                    />
                    <img
                        class="h-10 w-10 flex-0 rounded-full object-cover ring-4 ring-gray-800 ring-offset-1 ring-offset-gray-800"
                        src="images/avatars/male-09.jpg"
                    />
                    <img
                        class="h-10 w-10 flex-0 rounded-full object-cover ring-4 ring-gray-800 ring-offset-1 ring-offset-gray-800"
                        src="images/avatars/male-16.jpg"
                    />
                </div>
                <div class="ml-4 font-medium tracking-tight text-gray-400">
                    {{ 'AUTH.DESCRIPTION' | transloco }}
                </div>
            </div>
        </div>
    </div>
    <div
        class="w-full px-4 py-8 sm:bg-card sm:w-auto sm:rounded-2xl sm:p-12 sm:shadow md:flex md:h-full md:justify-end md:rounded-none md:p-16 md:pt-24 md:shadow-none"
    >
        <div class="mx-auto w-full max-w-80 sm:mx-0 sm:w-80">
            <!-- Logo -->
            <app-logo
                svgUrl="images/logo/logo.svg"
                customClass="w-24 text-primary"
            ></app-logo>

            <!-- Title -->
            <div
                class="mt-8 text-4xl font-extrabold leading-tight tracking-tight"
            >
                {{ 'AUTH.CONFIRMATION_REQUIRED.TITLE' | transloco }}
            </div>
            <div class="mt-4">
                {{ 'AUTH.CONFIRMATION_REQUIRED.DESCRIPTION' | transloco }}
            </div>

            <!-- Form footer -->
            <div class="text-secondary mt-8 text-md font-medium">
                <span>
                    {{ 'AUTH.CONFIRMATION_REQUIRED.RETURNTO' | transloco }}
                </span>
                <a
                    class="ml-1 text-primary-500 hover:underline"
                    [routerLink]="['/sign-in']"
                >
                    {{ 'AUTH.CONFIRMATION_REQUIRED.SIGN_IN' | transloco }}
                </a>
            </div>
        </div>
    </div>
</div>
